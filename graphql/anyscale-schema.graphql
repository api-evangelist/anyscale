# ─────────────────────────────────────────────
# Payload / Response Types
# ─────────────────────────────────────────────

type WorkspacePayload {
  workspace: Workspace
  errors: [UserError!]!
}

type JobPayload {
  job: Job
  errors: [UserError!]!
}

type ServicePayload {
  service: Service
  errors: [UserError!]!
}

type ClusterPayload {
  cluster: Cluster
  errors: [UserError!]!
}

type ComputeConfigPayload {
  computeConfig: ComputeConfig
  errors: [UserError!]!
}

type ContainerImagePayload {
  containerImage: ContainerImage
  errors: [UserError!]!
}

type CloudPayload {
  cloud: Cloud
  errors: [UserError!]!
}

type ProjectPayload {
  project: Project
  errors: [UserError!]!
}

type OrganizationMemberPayload {
  member: OrganizationMember
  errors: [UserError!]!
}

type ApiKeyPayload {
  apiKey: ApiKey
  rawKey: String
  errors: [UserError!]!
}

type LLMEndpointPayload {
  endpoint: LLMEndpoint
  errors: [UserError!]!
}

type FineTuneJobPayload {
  fineTuneJob: FineTuneJob
  errors: [UserError!]!
}

type DeletePayload {
  id: ID!
  success: Boolean!
  errors: [UserError!]!
}

type UserError {
  field: String
  message: String!
  code: String
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # Organization
  organization(id: ID!): Organization
  me: User

  # Projects
  project(id: ID!): Project
  projects(
    organizationId: ID!
    pagination: PaginationInput
    sort: SortInput
  ): [Project!]!

  # Clouds
  cloud(id: ID!): Cloud
  clouds(
    organizationId: ID!
    provider: CloudProvider
    type: CloudType
  ): [Cloud!]!

  # Compute Configs
  computeConfig(id: ID!): ComputeConfig
  computeConfigs(
    projectId: ID
    organizationId: ID
    pagination: PaginationInput
    sort: SortInput
  ): ComputeConfigConnection!

  # Container Images
  containerImage(id: ID!): ContainerImage
  containerImages(
    projectId: ID
    organizationId: ID
    buildStatus: ImageBuildStatus
    pagination: PaginationInput
    sort: SortInput
  ): ContainerImageConnection!

  # Clusters
  cluster(id: ID!): Cluster
  clusters(
    projectId: ID
    cloudId: ID
    status: ClusterStatus
    pagination: PaginationInput
    sort: SortInput
  ): ClusterConnection!

  # Workspaces
  workspace(id: ID!): Workspace
  workspaces(
    projectId: ID!
    status: WorkspaceStatus
    pagination: PaginationInput
    sort: SortInput
  ): WorkspaceConnection!

  # Jobs
  job(id: ID!): Job
  jobs(
    projectId: ID!
    status: JobStatus
    pagination: PaginationInput
    sort: SortInput
  ): JobConnection!

  # Services
  service(id: ID!): Service
  services(
    projectId: ID!
    status: ServiceStatus
    pagination: PaginationInput
    sort: SortInput
  ): ServiceConnection!

  # LLM Endpoints
  llmEndpoint(id: ID!): LLMEndpoint
  llmEndpoints(
    organizationId: ID
    projectId: ID
    status: EndpointStatus
    pagination: PaginationInput
  ): LLMEndpointConnection!

  # LLM Models
  llmModel(id: ID!): LLMModel
  llmModels(
    type: ModelType
    provider: String
    isAvailable: Boolean
  ): [LLMModel!]!

  # Fine-Tune Jobs
  fineTuneJob(id: ID!): FineTuneJob
  fineTuneJobs(
    projectId: ID
    organizationId: ID
    status: FineTuneStatus
    pagination: PaginationInput
  ): FineTuneJobConnection!

  # Logs
  logs(
    filter: LogFilterInput!
    pagination: PaginationInput
  ): LogEntryConnection!

  # API Keys
  apiKeys: [ApiKey!]!
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # Workspace Mutations
  createWorkspace(input: CreateWorkspaceInput!): WorkspacePayload!
  updateWorkspace(id: ID!, input: UpdateWorkspaceInput!): WorkspacePayload!
  startWorkspace(id: ID!): WorkspacePayload!
  stopWorkspace(id: ID!): WorkspacePayload!
  deleteWorkspace(id: ID!): DeletePayload!

  # Job Mutations
  createJob(input: CreateJobInput!): JobPayload!
  updateJob(id: ID!, input: UpdateJobInput!): JobPayload!
  stopJob(id: ID!): JobPayload!
  retryJob(id: ID!): JobPayload!
  deleteJob(id: ID!): DeletePayload!

  # Service Mutations
  createService(input: CreateServiceInput!): ServicePayload!
  updateService(id: ID!, input: UpdateServiceInput!): ServicePayload!
  rollbackService(id: ID!, versionId: ID!): ServicePayload!
  updateServiceTraffic(input: UpdateServiceTrafficInput!): ServicePayload!
  terminateService(id: ID!): ServicePayload!
  deleteService(id: ID!): DeletePayload!

  # Cluster Mutations
  createCluster(input: CreateClusterInput!): ClusterPayload!
  terminateCluster(id: ID!): ClusterPayload!
  deleteCluster(id: ID!): DeletePayload!

  # Compute Config Mutations
  createComputeConfig(input: CreateComputeConfigInput!): ComputeConfigPayload!
  updateComputeConfig(id: ID!, input: UpdateComputeConfigInput!): ComputeConfigPayload!
  deleteComputeConfig(id: ID!): DeletePayload!

  # Container Image Mutations
  createContainerImage(input: CreateContainerImageInput!): ContainerImagePayload!
  deleteContainerImage(id: ID!): DeletePayload!

  # Cloud Mutations
  createCloud(input: CreateCloudInput!): CloudPayload!
  updateCloud(id: ID!, input: UpdateCloudInput!): CloudPayload!
  deleteCloud(id: ID!): DeletePayload!

  # Project Mutations
  createProject(input: CreateProjectInput!): ProjectPayload!
  updateProject(id: ID!, input: UpdateProjectInput!): ProjectPayload!
  deleteProject(id: ID!): DeletePayload!
  addProjectMember(projectId: ID!, userId: ID!, role: ProjectRole!): ProjectPayload!
  removeProjectMember(projectId: ID!, userId: ID!): ProjectPayload!
  updateProjectMemberRole(projectId: ID!, userId: ID!, role: ProjectRole!): ProjectPayload!

  # Organization Mutations
  inviteOrganizationMember(organizationId: ID!, input: InviteOrganizationMemberInput!): OrganizationMemberPayload!
  updateOrganizationMemberRole(organizationId: ID!, input: UpdateOrganizationMemberRoleInput!): OrganizationMemberPayload!
  removeOrganizationMember(organizationId: ID!, userId: ID!): DeletePayload!

  # API Key Mutations
  createApiKey(input: CreateApiKeyInput!): ApiKeyPayload!
  deleteApiKey(id: ID!): DeletePayload!

  # LLM Endpoint Mutations
  createLLMEndpoint(input: CreateLLMEndpointInput!): LLMEndpointPayload!
  updateLLMEndpoint(id: ID!, input: UpdateLLMEndpointInput!): LLMEndpointPayload!
  deleteLLMEndpoint(id: ID!): DeletePayload!

  # Fine-Tune Job Mutations
  createFineTuneJob(input: CreateFineTuneJobInput!): FineTuneJobPayload!
  cancelFineTuneJob(id: ID!): FineTuneJobPayload!
  deleteFineTuneJob(id: ID!): DeletePayload!

  # LLM Inference Mutations
  chatCompletion(input: ChatCompletionInput!): ChatCompletion!
  createEmbedding(input: EmbeddingInput!): EmbeddingResponse!
}

# ─────────────────────────────────────────────
# Subscription Root
# ─────────────────────────────────────────────

type Subscription {
  # Workspace Events
  workspaceStatusChanged(id: ID!): Workspace!
  workspaceLogs(id: ID!, level: LogLevel): LogEntry!

  # Job Events
  jobStatusChanged(id: ID!): Job!
  jobLogs(id: ID!, level: LogLevel): LogEntry!

  # Service Events
  serviceStatusChanged(id: ID!): Service!
  serviceHealthChanged(id: ID!): Service!
  serviceLogs(id: ID!, level: LogLevel): LogEntry!

  # Cluster Events
  clusterStatusChanged(id: ID!): Cluster!
  clusterNodeAdded(clusterId: ID!): ClusterNode!
  clusterNodeRemoved(clusterId: ID!): ClusterNode!

  # Container Image Build Events
  containerImageBuildStatusChanged(id: ID!): ContainerImage!
  containerImageBuildLogs(id: ID!): LogEntry!

  # Fine-Tune Job Events
  fineTuneJobStatusChanged(id: ID!): FineTuneJob!
  fineTuneJobMetricsUpdated(id: ID!): FineTuneJob!

  # LLM Endpoint Events
  llmEndpointStatusChanged(id: ID!): LLMEndpoint!
}
