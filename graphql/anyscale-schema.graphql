"""
Anyscale GraphQL Schema
Derived from the Anyscale Platform REST API covering workspaces, jobs, services,
clusters, compute configurations, container images, clouds, projects, organizations,
logs, and LLM endpoints.
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Upload

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum WorkspaceStatus {
  STARTING
  RUNNING
  STOPPING
  STOPPED
  ERROR
  PENDING
}

enum JobStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
  STOPPED
  TERMINATED
}

enum ServiceStatus {
  STARTING
  RUNNING
  UPDATING
  SCALING
  TERMINATING
  TERMINATED
  ERROR
  UNHEALTHY
}

enum ClusterStatus {
  STARTING
  RUNNING
  UPDATING
  TERMINATING
  TERMINATED
  ERROR
}

enum CloudProvider {
  AWS
  GCP
  AZURE
}

enum CloudType {
  HOSTED
  BYOC
}

enum ImageBuildStatus {
  PENDING
  BUILDING
  SUCCEEDED
  FAILED
}

enum NodeInstanceType {
  CPU
  GPU
  TPU
}

enum LogLevel {
  DEBUG
  INFO
  WARNING
  ERROR
  CRITICAL
}

enum SortOrder {
  ASC
  DESC
}

enum RolloutStrategy {
  CANARY
  BLUE_GREEN
  ROLLING
  IMMEDIATE
}

enum AuthProvider {
  GOOGLE
  GITHUB
  SAML
  OKTA
  AZURE_AD
}

enum OrganizationRole {
  OWNER
  ADMIN
  MEMBER
  VIEWER
  BILLING_ADMIN
}

enum ProjectRole {
  OWNER
  EDITOR
  VIEWER
}

enum ResourceType {
  WORKSPACE
  JOB
  SERVICE
  CLUSTER
  COMPUTE_CONFIG
  CONTAINER_IMAGE
  CLOUD
  PROJECT
}

enum HealthStatus {
  HEALTHY
  UNHEALTHY
  DEGRADED
  UNKNOWN
}

enum ScalingPolicy {
  FIXED
  AUTOSCALING
}

enum FineTuneStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
  CANCELLED
}

enum ModelType {
  BASE
  FINE_TUNED
  INSTRUCTION_TUNED
}

enum EndpointStatus {
  PENDING
  ACTIVE
  UPDATING
  DELETING
  ERROR
}

# ─────────────────────────────────────────────
# Pagination
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int!
}

# ─────────────────────────────────────────────
# Core Entity Types
# ─────────────────────────────────────────────

type Organization {
  id: ID!
  name: String!
  slug: String!
  description: String
  createdAt: DateTime!
  updatedAt: DateTime!
  members: [OrganizationMember!]!
  projects: [Project!]!
  clouds: [Cloud!]!
  quotas: ResourceQuota
  billingInfo: BillingInfo
  ssoConfig: SSOConfig
}

type OrganizationMember {
  id: ID!
  user: User!
  role: OrganizationRole!
  joinedAt: DateTime!
}

type User {
  id: ID!
  email: String!
  name: String!
  avatarUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
  organizationRoles: [OrganizationRole!]!
  projectRoles: [ProjectMember!]!
  apiKeys: [ApiKey!]!
}

type ApiKey {
  id: ID!
  name: String!
  prefix: String!
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  scopes: [String!]!
}

type Project {
  id: ID!
  name: String!
  description: String
  organizationId: ID!
  organization: Organization!
  createdAt: DateTime!
  updatedAt: DateTime!
  members: [ProjectMember!]!
  workspaces: WorkspaceConnection!
  jobs: JobConnection!
  services: ServiceConnection!
  tags: [String!]!
}

type ProjectMember {
  id: ID!
  user: User!
  role: ProjectRole!
  joinedAt: DateTime!
}

type Cloud {
  id: ID!
  name: String!
  provider: CloudProvider!
  type: CloudType!
  region: String!
  organizationId: ID!
  status: HealthStatus!
  config: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
  clusters: [Cluster!]!
}

type ComputeConfig {
  id: ID!
  name: String!
  description: String
  organizationId: ID!
  projectId: ID
  headNodeType: NodeConfig!
  workerNodeTypes: [WorkerNodeConfig!]!
  cloudId: ID
  cloud: Cloud
  scalingPolicy: ScalingPolicy!
  minWorkers: Int
  maxWorkers: Int
  region: String
  availabilityZones: [String!]
  isDefault: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type NodeConfig {
  instanceType: String!
  resources: NodeResources!
  diskSizeGb: Int
  spotEnabled: Boolean!
}

type WorkerNodeConfig {
  instanceType: String!
  resources: NodeResources!
  minWorkers: Int!
  maxWorkers: Int!
  spotEnabled: Boolean!
  gpuType: String
}

type NodeResources {
  cpu: Float!
  memory: Float!
  gpu: Float
  gpuType: String
  acceleratorType: String
}

type ContainerImage {
  id: ID!
  name: String!
  tag: String!
  digest: String
  registryUrl: String!
  organizationId: ID!
  projectId: ID
  buildStatus: ImageBuildStatus!
  baseImage: String
  pythonVersion: String
  rayVersion: String!
  packages: [String!]!
  envVars: [EnvVar!]!
  buildLogs: String
  sizeBytes: Int
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EnvVar {
  name: String!
  value: String
  secret: Boolean!
}

type Cluster {
  id: ID!
  name: String!
  status: ClusterStatus!
  computeConfigId: ID
  computeConfig: ComputeConfig
  containerImageId: ID
  containerImage: ContainerImage
  cloudId: ID!
  cloud: Cloud!
  projectId: ID
  project: Project
  headNode: ClusterNode
  workerNodes: [ClusterNode!]!
  rayDashboardUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
  terminatedAt: DateTime
}

type ClusterNode {
  id: ID!
  instanceType: String!
  region: String!
  availabilityZone: String!
  ipAddress: String
  status: String!
  resources: NodeResources!
  isHead: Boolean!
  startedAt: DateTime
}

type Workspace {
  id: ID!
  name: String!
  description: String
  status: WorkspaceStatus!
  projectId: ID!
  project: Project!
  computeConfigId: ID
  computeConfig: ComputeConfig
  containerImageId: ID
  containerImage: ContainerImage
  clusterId: ID
  cluster: Cluster
  jupyterUrl: String
  vscodeUrl: String
  gitRepo: String
  gitBranch: String
  envVars: [EnvVar!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  lastActiveAt: DateTime
  createdBy: User!
}

type Job {
  id: ID!
  name: String!
  description: String
  status: JobStatus!
  projectId: ID!
  project: Project!
  computeConfigId: ID
  computeConfig: ComputeConfig
  containerImageId: ID
  containerImage: ContainerImage
  clusterId: ID
  cluster: Cluster
  entrypoint: String!
  workingDir: String
  runtimeEnv: JSON
  numCpus: Float
  numGpus: Float
  memoryGb: Float
  maxRetries: Int!
  scheduleExpression: String
  submittedBy: User!
  startedAt: DateTime
  completedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  logs: [LogEntry!]!
  metrics: JobMetrics
}

type JobMetrics {
  cpuUtilization: Float
  memoryUtilizationGb: Float
  gpuUtilization: Float
  durationSeconds: Int
}

type Service {
  id: ID!
  name: String!
  description: String
  status: ServiceStatus!
  projectId: ID!
  project: Project!
  computeConfigId: ID
  computeConfig: ComputeConfig
  containerImageId: ID
  containerImage: ContainerImage
  applicationConfig: JSON!
  serveConfigPath: String
  ingressUrl: String
  numReplicas: Int!
  minReplicas: Int
  maxReplicas: Int
  scalingPolicy: ScalingPolicy!
  currentVersion: ServiceVersion
  versions: [ServiceVersion!]!
  rolloutStrategy: RolloutStrategy!
  trafficPolicy: TrafficPolicy
  healthCheck: HealthCheckConfig
  createdAt: DateTime!
  updatedAt: DateTime!
  createdBy: User!
}

type ServiceVersion {
  id: ID!
  serviceId: ID!
  version: String!
  containerImageId: ID!
  containerImage: ContainerImage!
  applicationConfig: JSON!
  trafficWeight: Float!
  status: ServiceStatus!
  deployedAt: DateTime!
  deployedBy: User!
}

type TrafficPolicy {
  versions: [VersionTraffic!]!
}

type VersionTraffic {
  versionId: ID!
  weight: Float!
}

type HealthCheckConfig {
  path: String!
  port: Int!
  intervalSeconds: Int!
  timeoutSeconds: Int!
  healthyThreshold: Int!
  unhealthyThreshold: Int!
}

type LogEntry {
  timestamp: DateTime!
  level: LogLevel!
  message: String!
  source: String
  resourceId: ID
  resourceType: ResourceType
}

type ResourceQuota {
  maxCpu: Float
  maxMemoryGb: Float
  maxGpu: Float
  maxWorkspaces: Int
  maxJobs: Int
  maxServices: Int
  maxClusters: Int
}

type BillingInfo {
  plan: String!
  currentPeriodStart: DateTime!
  currentPeriodEnd: DateTime!
  estimatedCostUsd: Float
  creditsRemaining: Float
}

type SSOConfig {
  provider: AuthProvider!
  domain: String!
  isEnabled: Boolean!
  metadataUrl: String
}

# ─────────────────────────────────────────────
# LLM Endpoint Types
# ─────────────────────────────────────────────

type LLMEndpoint {
  id: ID!
  name: String!
  modelId: String!
  model: LLMModel
  status: EndpointStatus!
  organizationId: ID!
  projectId: ID
  serviceUrl: String
  contextWindow: Int
  maxTokens: Int
  numReplicas: Int!
  scalingPolicy: ScalingPolicy!
  computeConfigId: ID
  computeConfig: ComputeConfig
  createdAt: DateTime!
  updatedAt: DateTime!
}

type LLMModel {
  id: ID!
  name: String!
  provider: String!
  type: ModelType!
  contextWindow: Int!
  maxOutputTokens: Int
  description: String
  tags: [String!]!
  isAvailable: Boolean!
  baseModelId: String
  fineTuneJob: FineTuneJob
}

type FineTuneJob {
  id: ID!
  name: String!
  status: FineTuneStatus!
  baseModelId: String!
  baseModel: LLMModel
  organizationId: ID!
  projectId: ID
  trainingDataUrl: String!
  validationDataUrl: String
  hyperparameters: FineTuneHyperparameters
  resultModelId: String
  resultModel: LLMModel
  metrics: FineTuneMetrics
  computeConfigId: ID
  createdAt: DateTime!
  startedAt: DateTime
  completedAt: DateTime
  createdBy: User!
}

type FineTuneHyperparameters {
  epochs: Int
  learningRate: Float
  batchSize: Int
  warmupSteps: Int
  loraRank: Int
  loraAlpha: Float
}

type FineTuneMetrics {
  trainLoss: Float
  validationLoss: Float
  trainTokensPerSecond: Float
  totalTrainSteps: Int
  epochsCompleted: Int
}

type ChatCompletion {
  id: ID!
  model: String!
  choices: [ChatChoice!]!
  usage: TokenUsage!
  createdAt: DateTime!
}

type ChatChoice {
  index: Int!
  message: ChatMessage!
  finishReason: String
}

type ChatMessage {
  role: String!
  content: String!
}

type TokenUsage {
  promptTokens: Int!
  completionTokens: Int!
  totalTokens: Int!
}

type Embedding {
  index: Int!
  embedding: [Float!]!
  object: String!
}

type EmbeddingResponse {
  model: String!
  data: [Embedding!]!
  usage: TokenUsage!
}

# ─────────────────────────────────────────────
# Connection / Pagination Types
# ─────────────────────────────────────────────

type WorkspaceConnection {
  edges: [WorkspaceEdge!]!
  pageInfo: PageInfo!
}

type WorkspaceEdge {
  node: Workspace!
  cursor: String!
}

type JobConnection {
  edges: [JobEdge!]!
  pageInfo: PageInfo!
}

type JobEdge {
  node: Job!
  cursor: String!
}

type ServiceConnection {
  edges: [ServiceEdge!]!
  pageInfo: PageInfo!
}

type ServiceEdge {
  node: Service!
  cursor: String!
}

type ClusterConnection {
  edges: [ClusterEdge!]!
  pageInfo: PageInfo!
}

type ClusterEdge {
  node: Cluster!
  cursor: String!
}

type ComputeConfigConnection {
  edges: [ComputeConfigEdge!]!
  pageInfo: PageInfo!
}

type ComputeConfigEdge {
  node: ComputeConfig!
  cursor: String!
}

type ContainerImageConnection {
  edges: [ContainerImageEdge!]!
  pageInfo: PageInfo!
}

type ContainerImageEdge {
  node: ContainerImage!
  cursor: String!
}

type LLMEndpointConnection {
  edges: [LLMEndpointEdge!]!
  pageInfo: PageInfo!
}

type LLMEndpointEdge {
  node: LLMEndpoint!
  cursor: String!
}

type FineTuneJobConnection {
  edges: [FineTuneJobEdge!]!
  pageInfo: PageInfo!
}

type FineTuneJobEdge {
  node: FineTuneJob!
  cursor: String!
}

type LogEntryConnection {
  edges: [LogEntryEdge!]!
  pageInfo: PageInfo!
}

type LogEntryEdge {
  node: LogEntry!
  cursor: String!
}

