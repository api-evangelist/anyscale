  containerImageId: ID
  gitRepo: String
  gitBranch: String
  envVars: [EnvVarInput!]
}

input UpdateWorkspaceInput {
  name: String
  description: String
  computeConfigId: ID
  containerImageId: ID
  envVars: [EnvVarInput!]
}

input CreateJobInput {
  name: String!
  description: String
  projectId: ID!
  entrypoint: String!
  workingDir: String
  computeConfigId: ID
  containerImageId: ID
  runtimeEnv: JSON
  numCpus: Float
  numGpus: Float
  memoryGb: Float
  maxRetries: Int
  scheduleExpression: String
  envVars: [EnvVarInput!]
}

